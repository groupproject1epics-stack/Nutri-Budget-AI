<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>NutriBudget AI · Meal Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body {
      min-height: 100vh;
      background: #0b1a1e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app-container {
      max-width: 1000px;
      width: 100%;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 48px 48px 32px 32px;
      padding: 26px 22px 30px;
      box-shadow: 0 30px 45px -15px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,215,150,0.08);
      border: 1px solid rgba(255, 215, 150, 0.15);
      position: relative;
      overflow: hidden;
      color: #f5efe6;
      transition: all 0.2s;
    }
    .app-container::before {
      content: '';
      position: absolute;
      inset: -40% -20%;
      background: 
        radial-gradient(circle at 10% 20%, #ff9a6c80 0%, transparent 40%),
        radial-gradient(circle at 90% 70%, #f7d56e80 0%, transparent 45%),
        radial-gradient(circle at 40% 80%, #7fc3b080 0%, transparent 40%),
        radial-gradient(circle at 70% 10%, #ff6b6b60 0%, transparent 35%),
        radial-gradient(circle at 20% 60%, #ffd93d60 0%, transparent 40%),
        radial-gradient(circle at 80% 40%, #6bcbff60 0%, transparent 35%);
      background-blend-mode: soft-light, overlay, normal, screen, lighten, normal;
      filter: blur(55px) brightness(1.3) saturate(1.1);
      animation: floatBg 24s infinite alternate ease-in-out;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes floatBg {
      0% { transform: translate(0,0) scale(1) rotate(0deg); }
      33% { transform: translate(5%,-7%) scale(1.3) rotate(4deg); }
      66% { transform: translate(-4%,6%) scale(0.9) rotate(-5deg); }
      100% { transform: translate(6%,-3%) scale(1.2) rotate(3deg); }
    }
    .app-container::after {
      content: '🍕 🍔 🥗 🍛 🥘 🍣 🍱 🥟 🍳 🥞 🧆 🍲';
      position: absolute;
      top: 8%;
      left: 0;
      font-size: 3.5rem;
      letter-spacing: 30px;
      opacity: 0.06;
      white-space: nowrap;
      width: 200%;
      animation: driftFood 40s linear infinite;
      pointer-events: none;
      z-index: 0;
      font-weight: 400;
      transform: rotate(-5deg);
    }
    @keyframes driftFood {
      0% { transform: translateX(-10%) rotate(-5deg); opacity: 0.04; }
      50% { opacity: 0.10; }
      100% { transform: translateX(-70%) rotate(-5deg); opacity: 0.04; }
    }
    .content { position: relative; z-index: 2; }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand h1 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(145deg, #fff3e0, #fdd9b5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px #ffb07c80;
    }
    .brand span { font-size: 2rem; filter: drop-shadow(0 0 8px #ffb27a); }
    .currency-badge {
      background: rgba(0, 30, 20, 0.5);
      backdrop-filter: blur(4px);
      padding: 6px 18px;
      border-radius: 100px;
      border: 1px solid #f8d5a3;
      font-weight: 500;
      font-size: 1rem;
      color: #feeedb;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .problem-banner {
      background: rgba(255, 70, 50, 0.12);
      border: 1px solid rgba(255, 100, 80, 0.25);
      border-radius: 20px;
      padding: 12px 18px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .problem-banner .icon { font-size: 1.8rem; }
    .problem-banner .text {
      font-size: 0.85rem;
      opacity: 0.85;
      flex: 1;
    }
    .problem-banner .text strong { color: #ff9a7a; }

    .location-map-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 16px;
    }
    .location-card {
      flex: 1;
      min-width: 200px;
      background: rgba(20, 30, 28, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 10px 18px 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      border: 1px solid rgba(255, 215, 150, 0.25);
    }
    .loc-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
    }
    .loc-left .material-symbols-outlined { font-size: 1.6rem; color: #fdd7a4; }
    .loc-btn {
      background: #d9b38230;
      border: 1px solid #ebc9a0;
      color: #f3e2cf;
      padding: 6px 18px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }
    .loc-btn:hover { background: #ebc9a050; }
    .map-square {
      flex: 0 0 200px;
      width: 200px;
      height: 200px;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid rgba(255, 215, 150, 0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      background: #1a2a2a;
      position: relative;
    }
    .map-square iframe {
      width: 100%;
      height: 100%;
      border: none;
      filter: brightness(0.9) saturate(1.1);
    }
    .map-square .map-label {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      padding: 2px 14px;
      border-radius: 40px;
      font-size: 0.65rem;
      color: #f5efe6;
      white-space: nowrap;
      border: 1px solid rgba(255,215,150,0.2);
    }
    @media (max-width: 700px) {
      .map-square { flex: 0 0 100%; width: 100%; height: 220px; }
      .location-map-row { flex-direction: column; }
    }

    .ai-budget-section {
      background: rgba(248, 213, 163, 0.08);
      border: 1px solid rgba(248, 213, 163, 0.15);
      border-radius: 24px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
    }
    .ai-budget-section .label {
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ai-budget-section .label .material-symbols-outlined { color: #f8d5a3; }
    .ai-budget-section .budget-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.25);
      padding: 4px 16px 4px 12px;
      border-radius: 60px;
      border: 1px solid rgba(248, 213, 163, 0.2);
    }
    .ai-budget-section .budget-input-wrap input {
      background: transparent;
      border: none;
      color: #f5efe6;
      font-weight: 600;
      font-size: 1.1rem;
      width: 100px;
      padding: 6px 0;
      outline: none;
    }
    .ai-budget-section .ai-btn {
      background: #f8d5a3;
      color: #1a2a24;
      border: none;
      padding: 8px 28px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .ai-budget-section .ai-btn:hover { background: #ffdebb; transform: scale(1.02); }
    .ai-budget-section .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .app-selector {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 14px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(6px);
      border-radius: 60px;
      padding: 6px 18px 6px 22px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,215,150,0.12);
    }
    .app-selector span { font-size: 0.9rem; opacity: 0.7; margin-right: 4px; }
    .app-btn {
      background: rgba(255,255,240,0.05);
      border: 1px solid rgba(255,215,150,0.15);
      color: #ddd;
      padding: 4px 18px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .app-btn.active {
      background: #f8d5a3;
      color: #1a2a24;
      border-color: #f8d5a3;
      box-shadow: 0 0 20px #f8d5a360;
    }
    .app-btn:hover { background: #d9b38240; }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(6px);
      border-radius: 80px;
      padding: 8px 18px 8px 22px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,215,150,0.15);
    }
    .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: rgba(255,255,240,0.05);
      border: 1px solid rgba(255,215,150,0.2);
      color: #ddd;
      padding: 4px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .filter-btn.active {
      background: #f8d5a3;
      color: #1a2a24;
      border-color: #f8d5a3;
      box-shadow: 0 0 16px #f8d5a360;
    }
    .filter-btn:hover { background: #d9b38240; }

    /* ===== MEAL GRID ===== */
    .meal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
      margin: 12px 0 18px;
    }
    .meal-card {
      background: rgba(40, 50, 48, 0.4);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 16px 12px 14px;
      text-align: center;
      border: 1px solid rgba(255, 215, 150, 0.12);
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.4);
      position: relative;
    }
    .meal-card:hover { transform: translateY(-4px); background: rgba(60,70,65,0.5); border-color: #f5cb9e; }
    .meal-card .meal-emoji { font-size: 2.6rem; line-height: 1.2; }
    .meal-card .meal-name { font-weight: 600; font-size: 1.1rem; margin: 4px 0 2px; }
    .meal-card .meal-detail {
      font-size: 0.85rem;
      opacity: 0.9;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .meal-card .meal-detail span {
      background: rgba(0,0,0,0.2);
      padding: 2px 12px;
      border-radius: 40px;
    }
    .meal-card .price-ind { font-weight: 600; color: #f8debb; }
    .meal-card .veg-tag, .meal-card .nonveg-tag, .meal-card .vegan-tag {
      font-size: 0.65rem;
      padding: 0 10px;
      border-radius: 40px;
      display: inline-block;
      margin-top: 4px;
    }
    .meal-card .veg-tag { background: rgba(0,80,40,0.5); color: #8fdb9a; }
    .meal-card .nonveg-tag { background: rgba(120,30,20,0.5); color: #ff9a8a; }
    .meal-card .vegan-tag { background: rgba(30,100,60,0.5); color: #9fdfb0; }
    .meal-card .resto-tag { font-size: 0.6rem; opacity: 0.5; margin-top: 2px; }

    /* ===== QUANTITY CONTROLS (Blinkit Style) ===== */
    .quantity-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-top: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      padding: 2px;
      border: 1px solid rgba(255,215,150,0.15);
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .quantity-controls .qty-btn {
      background: transparent;
      border: none;
      color: #f5efe6;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quantity-controls .qty-btn:hover {
      background: rgba(248, 213, 163, 0.2);
    }
    .quantity-controls .qty-btn:active {
      transform: scale(0.9);
    }
    .quantity-controls .qty-btn.minus {
      color: #ff7a5a;
    }
    .quantity-controls .qty-btn.plus {
      color: #8fdb9a;
    }
    .quantity-controls .qty-display {
      min-width: 28px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      color: #f8d5a3;
      padding: 0 4px;
    }
    .quantity-controls .add-btn {
      background: #f8d5a3;
      color: #1a2a24;
      border: none;
      padding: 4px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      height: 30px;
    }
    .quantity-controls .add-btn:hover {
      background: #ffdebb;
      transform: scale(1.05);
    }
    .quantity-controls .add-btn:active {
      transform: scale(0.95);
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .quantity-controls.pop {
      animation: popIn 0.3s ease;
    }

    /* ===== CART SUMMARY ===== */
    .info-panel {
      background: rgba(15, 25, 23, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 16px 22px;
      margin-top: 6px;
      border: 1px solid rgba(245, 205, 150, 0.2);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .calorie-box {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .calorie-box .material-symbols-outlined { font-size: 2rem; color: #f8c794; }
    .calorie-box .calorie-number {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fdebd0, #f8cfa0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .calorie-box .calorie-unit { font-size: 0.9rem; opacity: 0.7; }
    .calorie-box .item-count {
      font-size: 0.8rem;
      opacity: 0.5;
      margin-left: 6px;
    }
    .total-cost {
      background: rgba(0,0,0,0.25);
      padding: 6px 22px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.3rem;
      border: 1px solid #fad6a8;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }

    .shopping-list-section {
      margin-top: 18px;
      padding: 16px 20px;
      background: rgba(15, 25, 23, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      border: 1px solid rgba(245, 205, 150, 0.15);
    }
    .shopping-list-section h3 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 10px;
      color: #f8d5a3;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .shopping-list-section h3 .count {
      font-size: 0.8rem;
      opacity: 0.5;
      font-weight: 400;
    }
    .shopping-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 30px;
    }
    .shopping-list .list-item {
      background: rgba(248, 213, 163, 0.1);
      border: 1px solid rgba(248, 213, 163, 0.15);
      border-radius: 40px;
      padding: 4px 14px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      animation: popIn 0.3s ease;
    }
    .shopping-list .list-item .qty-badge {
      background: rgba(248, 213, 163, 0.2);
      border-radius: 40px;
      padding: 0 8px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #f8d5a3;
    }
    .shopping-list .list-item .remove {
      cursor: pointer;
      opacity: 0.4;
      font-size: 0.9rem;
    }
    .shopping-list .list-item .remove:hover { opacity: 1; color: #ff7a5a; }
    .shopping-list .empty-list {
      opacity: 0.4;
      font-size: 0.85rem;
      padding: 6px 0;
    }

    .review-section {
      margin-top: 18px;
      padding: 18px 22px;
      background: rgba(15, 25, 23, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      border: 1px solid rgba(245, 205, 150, 0.15);
    }
    .review-section h3 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 12px;
      color: #f8d5a3;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .review-section h3 .count {
      font-size: 0.8rem;
      opacity: 0.5;
      font-weight: 400;
    }
    .review-form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      background: rgba(0,0,0,0.2);
      padding: 14px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,150,0.08);
    }
    .review-form input, .review-form textarea, .review-form select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,215,150,0.15);
      color: #f5efe6;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }
    .review-form input:focus, .review-form textarea:focus, .review-form select:focus {
      border-color: #f8d5a3;
      box-shadow: 0 0 16px #f8d5a320;
    }
    .review-form input { flex: 1 1 140px; }
    .review-form select { flex: 0 0 120px; cursor: pointer; }
    .review-form textarea { flex: 1 1 100%; min-height: 50px; resize: vertical; }
    .review-form .submit-btn {
      background: #f8d5a3;
      color: #1a2a24;
      border: none;
      padding: 8px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
      flex: 0 0 auto;
    }
    .review-form .submit-btn:hover { background: #ffdebb; transform: scale(1.02); }
    .review-form .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .reviews-list {
      max-height: 250px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }
    .reviews-list::-webkit-scrollbar { width: 4px; }
    .reviews-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    .reviews-list::-webkit-scrollbar-thumb { background: #f8d5a360; border-radius: 4px; }

    .review-item {
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      padding: 12px 16px;
      border: 1px solid rgba(255,215,150,0.06);
      animation: popIn 0.3s ease;
    }
    .review-item .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 4px;
    }
    .review-item .review-name { font-weight: 600; font-size: 0.95rem; }
    .review-item .review-stars { color: #f8d5a3; letter-spacing: 1px; font-size: 0.9rem; }
    .review-item .review-date { font-size: 0.65rem; opacity: 0.4; }
    .review-item .review-text { font-size: 0.9rem; opacity: 0.85; margin-top: 2px; line-height: 1.4; word-wrap: break-word; }
    .no-reviews {
      text-align: center;
      opacity: 0.4;
      padding: 20px;
      font-size: 0.9rem;
    }

    .footnote {
      margin-top: 18px;
      font-size: 0.75rem;
      opacity: 0.6;
      text-align: center;
      border-top: 1px solid rgba(255,215,150,0.08);
      padding-top: 16px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 20px;
    }
    @media (max-width: 500px) {
      .app-container { padding: 18px 14px; }
      .brand h1 { font-size: 1.5rem; }
      .meal-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .filter-bar { border-radius: 40px; padding: 10px 14px; }
      .info-panel { flex-direction: column; align-items: stretch; }
      .total-cost { align-self: center; }
      .app-selector { border-radius: 40px; padding: 8px 14px; }
      .ai-budget-section { flex-direction: column; align-items: stretch; }
